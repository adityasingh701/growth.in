<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Growth Services</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: #fff;
}
header {
  text-align: center;
  padding: 40px 20px;
}
h1 {
  font-size: 2.5rem;
}
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}
.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.card h2 {
  margin-bottom: 10px;
}
.price {
  font-size: 1.8rem;
  margin: 10px 0;
  color: #38bdf8;
}
button {
  background: #38bdf8;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  color: #000;
}
.coupon {
  text-align: center;
  margin: 30px;
}
input {
  padding: 10px;
  border-radius: 6px;
  border: none;
  margin-right: 10px;
}
</style>
</head>
<body>

<header>
  <h1>🚀 Premium Instagram Growth</h1>
  <p>Fast • Safe • Dashboard Tracking</p>
</header>

<div class="coupon">
  <input type="text" id="coupon" placeholder="Enter Coupon Code">
  <button onclick="applyCoupon()">Apply</button>
</div>

<div class="container" id="plans"></div>

<script>
let discount = 0;

const plans = [
  {name: "Starter", price: 199, details: "15K Views • 300 Likes • 80 Comments • 250 Reposts"},
  {name: "Basic", price: 349, details: "40K Views • 700 Likes • 200 Comments • 400 Reposts"},
  {name: "Growth ⭐", price: 699, details: "95K Views • 1.5K Likes • 400 Comments • 600 Reposts"},
  {name: "Pro", price: 1299, details: "250K Views • 3K Likes • 600 Comments • 1K Reposts"},
  {name: "Elite", price: 2499, details: "600K Views • 8K Likes • 1.5K Comments • 3K Reposts"}
];

function renderPlans() {
  const container = document.getElementById('plans');
  container.innerHTML = '';

  plans.forEach(plan => {
    let finalPrice = plan.price - (plan.price * discount / 100);
    container.innerHTML += `
      <div class="card">
        <h2>${plan.name}</h2>
        <div class="price">₹${Math.round(finalPrice)}</div>
        <p>${plan.details}</p>
        <a href="https://wa.me/918840582737?text=Hi%20I%20want%20to%20buy%20Growth%20Combo">
<button>Buy Now</button>
</a>
      </div>
    `;
  });
}

function applyCoupon() {
  const code = document.getElementById('coupon').value;

  if(code === "ABHAY10") {
    discount = 10;
  } else if(code === "ADI20") {
    discount = 20;
  } else {
    discount = 0;
    alert("Invalid Coupon");
  }

  renderPlans();
}

renderPlans();
</script>

</body>
</html>
